# tools.toml — Default installed tools for the AURA harness.
# All tools proxy through local harness endpoints to platform services.
# Auth is handled by the proxy; no credentials are stored here.
#
# Environment variables:
#   BIND_PORT — local harness bind port (used in endpoint URLs)

# =============================================================================
# Orbit (10 tools)
# =============================================================================

[[tool]]
name = "orbit_push"
description = "Push a branch from the workspace to an orbit git repository"
endpoint = "http://127.0.0.1:${BIND_PORT}/api/orbit/push"
namespace = "orbit"
timeout_ms = 60000
[tool.input_schema]
type = "object"
required = ["org_id", "repo", "branch"]
[tool.input_schema.properties.org_id]
type = "string"
description = "Organization UUID"
[tool.input_schema.properties.repo]
type = "string"
description = "Repository name"
[tool.input_schema.properties.branch]
type = "string"
description = "Branch to push"
[tool.input_schema.properties.force]
type = "boolean"
description = "Force push (default: false)"

[[tool]]
name = "orbit_create_repo"
description = "Create a new orbit repository"
endpoint = "http://127.0.0.1:${BIND_PORT}/api/orbit/create_repo"
namespace = "orbit"
[tool.input_schema]
type = "object"
required = ["org_id", "project_id", "owner_id", "name"]
[tool.input_schema.properties.org_id]
type = "string"
description = "Organization UUID"
[tool.input_schema.properties.project_id]
type = "string"
description = "Project UUID"
[tool.input_schema.properties.owner_id]
type = "string"
description = "Owner UUID"
[tool.input_schema.properties.name]
type = "string"
description = "Repository name"
[tool.input_schema.properties.visibility]
type = "string"
description = "Visibility: private or public (default: private)"

[[tool]]
name = "orbit_list_repos"
description = "List accessible orbit repositories"
endpoint = "http://127.0.0.1:${BIND_PORT}/api/orbit/list_repos"
namespace = "orbit"
[tool.input_schema]
type = "object"

[[tool]]
name = "orbit_list_branches"
description = "List branches in an orbit repository"
endpoint = "http://127.0.0.1:${BIND_PORT}/api/orbit/list_branches"
namespace = "orbit"
[tool.input_schema]
type = "object"
required = ["org_id", "repo"]
[tool.input_schema.properties.org_id]
type = "string"
description = "Organization UUID"
[tool.input_schema.properties.repo]
type = "string"
description = "Repository name"

[[tool]]
name = "orbit_create_branch"
description = "Create a branch in an orbit repository"
endpoint = "http://127.0.0.1:${BIND_PORT}/api/orbit/create_branch"
namespace = "orbit"
[tool.input_schema]
type = "object"
required = ["org_id", "repo", "name"]
[tool.input_schema.properties.org_id]
type = "string"
description = "Organization UUID"
[tool.input_schema.properties.repo]
type = "string"
description = "Repository name"
[tool.input_schema.properties.name]
type = "string"
description = "Branch name"
[tool.input_schema.properties.source]
type = "string"
description = "Source branch (default: main)"

[[tool]]
name = "orbit_list_commits"
description = "List recent commits in an orbit repository"
endpoint = "http://127.0.0.1:${BIND_PORT}/api/orbit/list_commits"
namespace = "orbit"
[tool.input_schema]
type = "object"
required = ["org_id", "repo"]
[tool.input_schema.properties.org_id]
type = "string"
description = "Organization UUID"
[tool.input_schema.properties.repo]
type = "string"
description = "Repository name"
[tool.input_schema.properties.ref]
type = "string"
description = "Git ref (branch or tag)"
[tool.input_schema.properties.limit]
type = "integer"
description = "Max commits to return (default: 20)"

[[tool]]
name = "orbit_get_diff"
description = "Get diff for a commit in an orbit repository"
endpoint = "http://127.0.0.1:${BIND_PORT}/api/orbit/get_diff"
namespace = "orbit"
[tool.input_schema]
type = "object"
required = ["org_id", "repo", "sha"]
[tool.input_schema.properties.org_id]
type = "string"
description = "Organization UUID"
[tool.input_schema.properties.repo]
type = "string"
description = "Repository name"
[tool.input_schema.properties.sha]
type = "string"
description = "Commit SHA"

[[tool]]
name = "orbit_create_pr"
description = "Open a pull request in an orbit repository"
endpoint = "http://127.0.0.1:${BIND_PORT}/api/orbit/create_pr"
namespace = "orbit"
[tool.input_schema]
type = "object"
required = ["org_id", "repo", "source_branch", "target_branch", "title"]
[tool.input_schema.properties.org_id]
type = "string"
description = "Organization UUID"
[tool.input_schema.properties.repo]
type = "string"
description = "Repository name"
[tool.input_schema.properties.source_branch]
type = "string"
description = "Source branch"
[tool.input_schema.properties.target_branch]
type = "string"
description = "Target branch"
[tool.input_schema.properties.title]
type = "string"
description = "Pull request title"
[tool.input_schema.properties.description]
type = "string"
description = "Pull request description"

[[tool]]
name = "orbit_list_prs"
description = "List pull requests in an orbit repository"
endpoint = "http://127.0.0.1:${BIND_PORT}/api/orbit/list_prs"
namespace = "orbit"
[tool.input_schema]
type = "object"
required = ["org_id", "repo"]
[tool.input_schema.properties.org_id]
type = "string"
description = "Organization UUID"
[tool.input_schema.properties.repo]
type = "string"
description = "Repository name"
[tool.input_schema.properties.status]
type = "string"
description = "Filter by status: open, closed, or merged"

[[tool]]
name = "orbit_merge_pr"
description = "Merge a pull request in an orbit repository"
endpoint = "http://127.0.0.1:${BIND_PORT}/api/orbit/merge_pr"
namespace = "orbit"
[tool.input_schema]
type = "object"
required = ["org_id", "repo", "pr_id"]
[tool.input_schema.properties.org_id]
type = "string"
description = "Organization UUID"
[tool.input_schema.properties.repo]
type = "string"
description = "Repository name"
[tool.input_schema.properties.pr_id]
type = "string"
description = "Pull request ID"
[tool.input_schema.properties.strategy]
type = "string"
description = "Merge strategy: merge or squash (default: merge)"

# =============================================================================
# aura-storage (12 tools)
# =============================================================================

[[tool]]
name = "create_task"
description = "Create a task in a project"
endpoint = "http://127.0.0.1:${BIND_PORT}/api/storage/create_task"
namespace = "project"
[tool.input_schema]
type = "object"
required = ["project_id", "title"]
[tool.input_schema.properties.project_id]
type = "string"
description = "Project UUID"
[tool.input_schema.properties.title]
type = "string"
description = "Task title"
[tool.input_schema.properties.description]
type = "string"
description = "Task description"
[tool.input_schema.properties.spec_id]
type = "string"
description = "Spec UUID this task implements"
[tool.input_schema.properties.order_index]
type = "integer"
description = "Order index for sorting"

[[tool]]
name = "list_tasks"
description = "List tasks in a project, optionally filtered by status"
endpoint = "http://127.0.0.1:${BIND_PORT}/api/storage/list_tasks"
namespace = "project"
[tool.input_schema]
type = "object"
required = ["project_id"]
[tool.input_schema.properties.project_id]
type = "string"
description = "Project UUID"
[tool.input_schema.properties.status]
type = "string"
description = "Filter by status"

[[tool]]
name = "get_task"
description = "Get task details by ID"
endpoint = "http://127.0.0.1:${BIND_PORT}/api/storage/get_task"
namespace = "project"
[tool.input_schema]
type = "object"
required = ["task_id"]
[tool.input_schema.properties.task_id]
type = "string"
description = "Task UUID"

[[tool]]
name = "update_task"
description = "Update task fields"
endpoint = "http://127.0.0.1:${BIND_PORT}/api/storage/update_task"
namespace = "project"
[tool.input_schema]
type = "object"
required = ["task_id"]
[tool.input_schema.properties.task_id]
type = "string"
description = "Task UUID"
[tool.input_schema.properties.title]
type = "string"
description = "New title"
[tool.input_schema.properties.description]
type = "string"
description = "New description"
[tool.input_schema.properties.execution_notes]
type = "string"
description = "Execution notes"
[tool.input_schema.properties.files_changed]
type = "array"
description = "List of files changed"

[[tool]]
name = "transition_task"
description = "Move a task through the workflow (pending->ready->in_progress->done|failed|blocked)"
endpoint = "http://127.0.0.1:${BIND_PORT}/api/storage/transition_task"
namespace = "project"
[tool.input_schema]
type = "object"
required = ["task_id", "status"]
[tool.input_schema.properties.task_id]
type = "string"
description = "Task UUID"
[tool.input_schema.properties.status]
type = "string"
description = "Target status: ready, in_progress, done, failed, or blocked"

[[tool]]
name = "create_spec"
description = "Create a specification in a project"
endpoint = "http://127.0.0.1:${BIND_PORT}/api/storage/create_spec"
namespace = "project"
[tool.input_schema]
type = "object"
required = ["project_id", "title", "markdown_contents"]
[tool.input_schema.properties.project_id]
type = "string"
description = "Project UUID"
[tool.input_schema.properties.title]
type = "string"
description = "Spec title"
[tool.input_schema.properties.markdown_contents]
type = "string"
description = "Markdown content of the spec"
[tool.input_schema.properties.order_index]
type = "integer"
description = "Order index for sorting"

[[tool]]
name = "list_specs"
description = "List specifications in a project"
endpoint = "http://127.0.0.1:${BIND_PORT}/api/storage/list_specs"
namespace = "project"
[tool.input_schema]
type = "object"
required = ["project_id"]
[tool.input_schema.properties.project_id]
type = "string"
description = "Project UUID"

[[tool]]
name = "get_spec"
description = "Get a specification by ID"
endpoint = "http://127.0.0.1:${BIND_PORT}/api/storage/get_spec"
namespace = "project"
[tool.input_schema]
type = "object"
required = ["spec_id"]
[tool.input_schema.properties.spec_id]
type = "string"
description = "Spec UUID"

[[tool]]
name = "update_spec"
description = "Update a specification"
endpoint = "http://127.0.0.1:${BIND_PORT}/api/storage/update_spec"
namespace = "project"
[tool.input_schema]
type = "object"
required = ["spec_id"]
[tool.input_schema.properties.spec_id]
type = "string"
description = "Spec UUID"
[tool.input_schema.properties.title]
type = "string"
description = "New title"
[tool.input_schema.properties.markdown_contents]
type = "string"
description = "New markdown content"
[tool.input_schema.properties.order_index]
type = "integer"
description = "New order index"

[[tool]]
name = "create_log"
description = "Write a structured log entry to a project"
endpoint = "http://127.0.0.1:${BIND_PORT}/api/storage/create_log"
namespace = "project"
[tool.input_schema]
type = "object"
required = ["project_id", "message"]
[tool.input_schema.properties.project_id]
type = "string"
description = "Project UUID"
[tool.input_schema.properties.message]
type = "string"
description = "Log message"
[tool.input_schema.properties.level]
type = "string"
description = "Log level: info, warn, error (default: info)"
[tool.input_schema.properties.project_agent_id]
type = "string"
description = "Agent UUID"
[tool.input_schema.properties.metadata]
type = "object"
description = "Additional metadata"

[[tool]]
name = "list_logs"
description = "List log entries for a project"
endpoint = "http://127.0.0.1:${BIND_PORT}/api/storage/list_logs"
namespace = "project"
[tool.input_schema]
type = "object"
required = ["project_id"]
[tool.input_schema.properties.project_id]
type = "string"
description = "Project UUID"
[tool.input_schema.properties.level]
type = "string"
description = "Filter by log level"
[tool.input_schema.properties.limit]
type = "integer"
description = "Max entries to return (default: 50)"

[[tool]]
name = "get_project_stats"
description = "Get execution statistics for a project"
endpoint = "http://127.0.0.1:${BIND_PORT}/api/storage/get_project_stats"
namespace = "project"
[tool.input_schema]
type = "object"
required = ["project_id"]
[tool.input_schema.properties.project_id]
type = "string"
description = "Project UUID"

# =============================================================================
# aura-network (5 tools)
# =============================================================================

[[tool]]
name = "post_to_feed"
description = "Post a status update to the activity feed"
endpoint = "http://127.0.0.1:${BIND_PORT}/api/network/post_to_feed"
namespace = "social"
[tool.input_schema]
type = "object"
required = ["profile_id", "title"]
[tool.input_schema.properties.profile_id]
type = "string"
description = "Profile UUID (user or agent)"
[tool.input_schema.properties.title]
type = "string"
description = "Post title"
[tool.input_schema.properties.summary]
type = "string"
description = "Post body"
[tool.input_schema.properties.post_type]
type = "string"
description = "Type: post, push, or event (default: post)"
[tool.input_schema.properties.agent_id]
type = "string"
description = "Agent UUID"
[tool.input_schema.properties.user_id]
type = "string"
description = "User UUID"
[tool.input_schema.properties.metadata]
type = "object"
description = "Additional metadata"

[[tool]]
name = "list_projects"
description = "List projects in an organization"
endpoint = "http://127.0.0.1:${BIND_PORT}/api/network/list_projects"
namespace = "social"
[tool.input_schema]
type = "object"
required = ["org_id"]
[tool.input_schema.properties.org_id]
type = "string"
description = "Organization UUID"

[[tool]]
name = "get_project"
description = "Get project details"
endpoint = "http://127.0.0.1:${BIND_PORT}/api/network/get_project"
namespace = "social"
[tool.input_schema]
type = "object"
required = ["project_id"]
[tool.input_schema.properties.project_id]
type = "string"
description = "Project UUID"

[[tool]]
name = "check_budget"
description = "Check remaining credit budget for a user in an organization"
endpoint = "http://127.0.0.1:${BIND_PORT}/api/network/check_budget"
namespace = "social"
[tool.input_schema]
type = "object"
required = ["org_id", "user_id"]
[tool.input_schema.properties.org_id]
type = "string"
description = "Organization UUID"
[tool.input_schema.properties.user_id]
type = "string"
description = "User UUID"

[[tool]]
name = "record_usage"
description = "Record token usage for billing"
endpoint = "http://127.0.0.1:${BIND_PORT}/api/network/record_usage"
namespace = "social"
[tool.input_schema]
type = "object"
required = ["org_id", "user_id", "input_tokens", "output_tokens"]
[tool.input_schema.properties.org_id]
type = "string"
description = "Organization UUID"
[tool.input_schema.properties.user_id]
type = "string"
description = "User UUID"
[tool.input_schema.properties.input_tokens]
type = "integer"
description = "Number of input tokens used"
[tool.input_schema.properties.output_tokens]
type = "integer"
description = "Number of output tokens used"
[tool.input_schema.properties.agent_id]
type = "string"
description = "Agent UUID"
[tool.input_schema.properties.model]
type = "string"
description = "Model identifier"
